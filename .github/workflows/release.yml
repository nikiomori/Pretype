name: Draft Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

# Matches ci.yml — the pin lives in one place per workflow.
env:
  XCODE_VERSION: '26.3'

jobs:
  release:
    name: Build & Package Release
    # macOS 15 ships Xcode 16.3+ (Swift 6.1) — required by mlx-swift-lm 3.31.3.
    runs-on: macos-15
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Pinned to match ci.yml — releases must not depend on whatever
      # latest-stable happens to be on the runner image that day. Floor is
      # the macOS 26 SDK (FoundationModels framework).
      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      # A tag can be pushed from a red branch, and CI's verdict on a *commit*
      # says nothing about the tag. Gate the release on its own lint + tests so
      # a broken build never becomes a downloadable draft.
      - name: Lint
        run: |
          command -v swiftlint >/dev/null || brew install swiftlint
          swiftlint --strict

      - name: Test
        run: swift test

      - name: Install Metal toolchain
        run: xcodebuild -downloadComponent MetalToolchain || true

      # The pushed tag (e.g. v0.1.0) is the single source of the version;
      # GITHUB_RUN_NUMBER is the monotonic CFBundleVersion (survives shallow checkout).
      - name: Build App Bundle
        run: PRETYPE_VERSION="${GITHUB_REF_NAME#v}" PRETYPE_BUILD="${GITHUB_RUN_NUMBER}" ./Scripts/make-app.sh

      - name: Package App Bundle for Distribution
        run: ./Scripts/dist.sh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/Pretype.app.zip
          # Without this a missing zip only warns — and drafts an "release" with
          # nothing to download.
          fail_on_unmatched_files: true
          draft: true
          generate_release_notes: true
