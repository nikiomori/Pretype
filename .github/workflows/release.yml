name: Draft Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build & Package Release
    # macOS 15 ships Xcode 16.3+ (Swift 6.1) — required by mlx-swift-lm 3.31.3.
    runs-on: macos-15
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Pinned to match ci.yml — releases must not depend on whatever
      # latest-stable happens to be on the runner image that day. Floor is
      # the macOS 26 SDK (FoundationModels framework).
      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.3'

      - name: Install Metal toolchain
        run: xcodebuild -downloadComponent MetalToolchain || true

      # The pushed tag (e.g. v0.1.0) is the single source of the version;
      # GITHUB_RUN_NUMBER is the monotonic CFBundleVersion (survives shallow checkout).
      - name: Build App Bundle
        run: PRETYPE_VERSION="${GITHUB_REF_NAME#v}" PRETYPE_BUILD="${GITHUB_RUN_NUMBER}" ./Scripts/make-app.sh

      - name: Package App Bundle for Distribution
        run: ./Scripts/dist.sh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/Pretype.app.zip
          draft: true
          generate_release_notes: true
