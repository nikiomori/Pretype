<text x="72" y="760" font-size="12.5" fill="#77777D">The 16-language column is like-for-like — the same languages for every model — so the fan-out compares, even though the absolute level does not (zh/ja are character-masked and hold every row down equally).</text>
<text x="72" y="782" font-size="12.5" fill="#77777D">Single language cells carry ±5 pp and are not claims on their own; only the aggregates are. Latency is warm p50 on one Apple silicon machine.</text>
